{% extends "base.html" %}
{% block title %}Add a Business — BizConnect NG{% endblock %}

{% block content %}

<section class="form-section">
  <div class="form-container">
    <h1>➕ Add a New Business</h1>
    <p class="form-subtitle">Fill in the details below to list your business in the directory.</p>

    <form method="POST" action="{{ url_for('add_business') }}">

      <div class="form-group">
        <label for="name">Business Name <span class="required">*</span></label>
        <input type="text" id="name" name="name"
               placeholder="e.g. TechHub Lagos"
               value="{{ form_data.get('name', '') }}"
               required>
      </div>

      <div class="form-group">
        <label for="category">Category <span class="required">*</span></label>
        <select id="category" name="category" required>
          <option value="" disabled {% if not form_data.get('category') %}selected{% endif %}>-- Select a category --</option>
          {% set cats = ["Technology", "Food & Beverage", "Education", "Healthcare", "Agriculture",
                         "Finance", "Services", "Retail", "Entertainment", "Other"] %}
          {% for cat in cats %}
            <option value="{{ cat }}" {% if form_data.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description <span class="required">*</span></label>
        <textarea id="description" name="description" rows="4"
                  placeholder="What does this business do? What problem does it solve?"
                  required>{{ form_data.get('description', '') }}</textarea>
      </div>

      <div class="form-group">
        <label for="location">Location <span class="required">*</span></label>
        <input type="text" id="location" name="location"
               placeholder="e.g. Ikeja, Lagos"
               value="{{ form_data.get('location', '') }}"
               required>
      </div>

      <div class="form-group">
        <label for="contact">Contact (Email or Phone) <span class="required">*</span></label>
        <input type="text" id="contact" name="contact"
               placeholder="e.g. info@mybusiness.com or 0801-234-5678"
               value="{{ form_data.get('contact', '') }}"
               required>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('index') }}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit">Submit Business</button>
      </div>

    </form>
  </div>
</section>

{% endblock %}
